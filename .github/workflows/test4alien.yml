name: Test for alien 

on:
  workflow_dispatch:

env:
  RKD_REVISION: "01" # Change this if a build revision ever changes. 

jobs:
  run_alien:
    runs-on: ubuntu-latest

    steps:
    - name: Run alien
      run: |
        sudo apt update -qq && sudo apt upgrade -qq && sudo apt install -y -qq alien
        mkdir temp && cd temp
        curl -s -O https://rakudo.org/dl/star/rakudo-star-2025.01-01.tar.gz
        echo "running 1st ls" && ls -la
        echo "running unzip and tar..." && tar -xzf rakudo-star-2025.01-01.tar.gz
        cd rakudo-star-2025.01
        bin/rstar fetch -l
        bin/rstar install
        bin/rstar clean -s
        cd ..
        mv rakudo-star-2025.01 rakudo-star-2025.01_ORG
        tar -cf rakudo-star-2025.01.tar rakudo-star-2025.01_ORG
        for PKG in deb rpm; do
          sudo alien --to-${PKG} --description="Rakudo Star 2025.01" --version="01" --target="amd64" --verbose rakudo-star-2025.01.tar
        done
        echo "running 2nd ls" && ls -la
